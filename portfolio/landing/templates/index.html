<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{% endblock title %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body style="background-color: #122638">
    <div class="container" >
        <div class="w-100 h-100">    
            <div class="row">
                <div class="offset-md-2 col-md-8 offset-sm-0 col-sm-12" >
                    <div class="border border-info" style="color: #8AFFFF; background-color: #1B3852;">
                        <div style="display: flex; justify-content: center; align-items: center; " >
                            <a href="{% url 'español' %}"><img class="p-4 rounded-circle" src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRriBbEOdJGfInxlI60Xlzw7E5v2_pw6QLnkQ&s" alt="Castellano" class="" style="width: 100px; height: 100px;"></a>
                            <a href="{% url 'english' %}"><img class="p-4 rounded-circle" src="https://upload.wikimedia.org/wikipedia/commons/thumb/a/a4/Flag_of_the_United_States.svg/1280px-Flag_of_the_United_States.svg.png" style="width: 100px; height: 100px;"  alt="English" class=""></a>                          
                        </div>
                        <div style="display: flex; justify-content: center; align-items: center;">
                            {% block body %}
                            {% endblock %}
                        </div>
                    </div>
                </div>
            </div>
        </div>    
    </div>
</body>
</html>
