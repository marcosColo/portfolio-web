<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bootstrap demo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  </head>
  <body class="bg bg-dark text-light">
    <div class="container">
        <div class="row">
            <div class="col-md-8 offset-md-2 justify-content-center">
                <div class="d-flex justify-content-center">
                    <div class="d-flex justify-content-end align-items-end mt-2">    
                        <a href="{% url 'español' %}" class="mx-5"><img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRriBbEOdJGfInxlI60Xlzw7E5v2_pw6QLnkQ&s" class="rounded-circle" alt="español" style="height: 25px; width: 25px;"></a>
                        <a href="{% url 'ingles' %}" class="mx-5"><img src="https://upload.wikimedia.org/wikipedia/commons/thumb/a/a4/Flag_of_the_United_States.svg/1280px-Flag_of_the_United_States.svg.png" class="rounded-circle" alt="english" style="height: 25px; width: 25px;"></a>                       
                    </div>
                </div>
                <div class="container-fluid justify-content-center align-items-center">
                    <div class="">
                        {% block body %}
                        {% endblock %}
                    </div>
                </div>

        </div>
    </div>
    </div>

 
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
<div class="d-flex w-100 bg bg-primary mt-5 justify-content-center">
    <div class="justify-content-center align-items-center pt-3">
        <p class="align-items-center">2026 | Marcos Alvarez</p>
    </div>
</div>
</body>
</html>
